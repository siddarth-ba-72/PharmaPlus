    <desc id="desc">Warm gradient card style image showing shield and trust text.</desc>
    <defs>
        <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#1d4ed8" />
            <stop offset="100%" stop-color="#0f172a" />
